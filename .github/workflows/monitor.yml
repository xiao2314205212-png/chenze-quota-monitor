name: 陈泽网名额监控
on:
  workflow_dispatch:
concurrency:
  group: monitor
  cancel-in-progress: false
permissions:
  contents: read
  actions: write
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: state.json
          key: chenze-state-${{ github.run_id }}
      - name: 持续监控
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: |
          python check.py
          for i in $(seq 1 330); do
            sleep 60
            python check.py
          done
      - name: 自续
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run monitor.yml --ref master
          echo "自续成功"
